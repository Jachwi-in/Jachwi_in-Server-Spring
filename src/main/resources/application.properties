# Server
server.port=8080

# MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/jachwiin_db?serverTimezone=UTC&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Redis
redis.host=localhost
redis.port=6379

# Email
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# JWT (최소 32자 이상의 랜덤 문자열)
jwt.secret=${JWT_SECRET:jachwi-in-secret-key-must-be-at-least-32-characters}

# Claude API
claude.api.key=${CLAUDE_API_KEY:dummy-key-for-local}

# FastAPI Embedding Server
fastapi.base-url=http://localhost:8000

# Auth Server
auth-server.base-url=http://localhost:8081


apiVersion: apps/v1
kind: Deployment
metadata:
  name: jachwi-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jachwi-app
  template:
    metadata:
      labels:
        app: jachwi-app
    spec:
      containers:
        - name: jachwi-app
          image: jachwi-app:latest   # docker build 후 이미지 이름 맞춰서 변경
          imagePullPolicy: Never      # 로컬 이미지 사용 (minikube 환경)
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:mysql://mysql:3306/jachwi?serverTimezone=UTC&characterEncoding=UTF-8"
            - name: SPRING_DATASOURCE_USERNAME
              value: "root"
            - name: SPRING_DATASOURCE_PASSWORD
              value: "root"
            - name: REDIS_HOST
              value: "redis"
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              value: "kafka:9092"
---
apiVersion: v1
kind: Service
metadata:
  name: jachwi-app
spec:
  type: NodePort
  selector:
    app: jachwi-app
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30080   # 브라우저에서 <minikube-ip>:30080 으로 접근
